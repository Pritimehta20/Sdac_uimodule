<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin:0;
            padding:0;
        }
        video{
            width:100%;
            height:100vh;
            object-fit:cover;
            background-repeat: no-repeat;
            background-size: cover;
        }
        .morning{
            display:block;
        }
        .night{
            display:none;
        }
        .gn{
            display: none;
        }
        .gm{
            display: block;
        }
        h1{
            position:absolute;
        }
        @media(prefers-color-scheme: dark){
            .night{
                display:block;
            }
            .morning{
                display:none;
            }
            .gn{
                display: block;
                color: aliceblue;
            }
            .gm{
                display: none;
            }
        }

    </style>
</head>
<body>
    <h1 class="gn">Good Night</h1>
    <video class="night" src="night.mp4" muted autoplay loop></video>
    <h1 class="gm">Good morning</h1>
    <video  class="morning" src="morn.mp4" muted autoplay loop></video>
</body>
</html>
