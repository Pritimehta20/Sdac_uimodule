<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        video{
            width:100%;
            height:100%;
            background-repeat: no-repeat;
            background-size: cover;
            object-fit: cover;
        }
        h1{
            position: absolute;
            font-size: 80px;
        }
        @media(max-height:500px){
            h1{
                color: white;
            }
        }
    </style>
</head>
<body>
    <h1>Nanital</h1>
    <video src="video.mp4" loop muted autoplay ></video>
</body>
</html>
