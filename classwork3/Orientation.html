<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{margin:0;
        padding:0;
    }
    video{
        width:100%;
        height:100%;
        object-fit:cover;
        background-repeat: no-repeat;
        background-size: cover;
    }
    .morning{
        display:none;
    }
    @media(orientation: portrait){
        .night{
            display:none;
        }
        .morning{
            display:block;
        }
    }


    </style>
</head>
<body>
    <video class="night" src="night.mp4" muted autoplay loop></video>
    <video  class="morning" src="potratit.mp4" muted autoplay loop></video>
</body>
</html>
